site_name: Dance Central Definitive Docs
site_description: Build, workflow, and tooling documentation for Dance Central Definitive.
docs_dir: docs
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: amber
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: amber
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Play the Game: play-the-game.md
  - Getting Started: getting-started.md
  - Build System: build-system.md
  - Modding Workflow: modding-workflow.md
  - Xenia Integration: xenia.md
  - Troubleshooting: troubleshooting.md
  - Contributing: contributing.md
  - Legal and Licensing: legal.md