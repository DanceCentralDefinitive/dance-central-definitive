name: release-patches

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ensure build tools are executable
        run: chmod +x scripts/build.sh tools/linux/*

      - name: Stamp build version for tag release
        run: |
          SHORT_COMMIT_HASH="$(git rev-parse --short HEAD)"
          printf '"Build: Definitive %s (commit: %s base: 121004)"\n' "$GITHUB_REF_NAME" "$SHORT_COMMIT_HASH" > src/config/ham_version.dta

      - name: Build deluxe non-debug patch files
        run: scripts/build.sh --clean

      - name: Extract release notes from changelog
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          tag_name = os.environ['GITHUB_REF_NAME']
          changelog = Path('CHANGELOG.md').read_text(encoding='utf-8')
          heading_pattern = re.compile(rf'^## \[{re.escape(tag_name)}\] - .+$', re.MULTILINE)

          match = heading_pattern.search(changelog)
          if not match:
              raise SystemExit(f'No changelog section found for {tag_name}')

          start = match.start()
          next_heading = re.search(r'^## \[.+?\] - .+$', changelog[match.end():], re.MULTILINE)
          end = match.end() + next_heading.start() if next_heading else len(changelog)

          notes = changelog[start:end].strip() + '\n'
          Path('release-notes.md').write_text(notes, encoding='utf-8')
          PY

      - name: Prepare patch archive
        run: |
          test -f out/gen/patch_xbox.hdr
          test -f out/gen/patch_xbox_0.ark
          test -f out/deluxe.xex
          ARCHIVE_NAME="dance-central-definitive-patches-${GITHUB_REF_NAME}.zip"
          zip -j "$ARCHIVE_NAME" out/gen/patch_xbox.hdr out/gen/patch_xbox_0.ark out/deluxe.xex
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE_NAME }}
          body_path: release-notes.md